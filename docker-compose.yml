services:
  # ========== API 服务 (FastAPI + LibreOffice) ==========
  api:
    build: .
    image: sga-office:latest
    env_file:
      - .env
    environment:
      TZ: 'Asia/Shanghai'
    ports:
      - "5101:8000"
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    restart: unless-stopped
